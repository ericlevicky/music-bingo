# fly.toml — Fly.io app configuration for Music Bingo.
# Docs: https://fly.io/docs/reference/configuration/
#
# Deploy with:  fly deploy
# First time:   fly launch --no-deploy  (then set secrets, then fly deploy)
#
# Set secrets (never committed) via the CLI:
#   fly secrets set SESSION_SECRET=$(node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")
#   fly secrets set SPOTIFY_CLIENT_ID=...
#   fly secrets set SPOTIFY_CLIENT_SECRET=...
#   fly secrets set SPOTIFY_REDIRECT_URI=https://<your-app>.fly.dev/auth/spotify/callback
#   fly secrets set GOOGLE_CLIENT_ID=...
#   fly secrets set GOOGLE_CLIENT_SECRET=...
#   fly secrets set GOOGLE_REDIRECT_URI=https://<your-app>.fly.dev/auth/google/callback

app = 'music-bingo'
primary_region = 'iad'

[build]

[env]
  NODE_ENV = 'production'

[http_service]
  internal_port = 3000
  force_https = true
  # Keep at least one machine running at all times — no cold-start sleeps.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 200
    soft_limit = 150

[vm]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
