<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Bingo</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav>
    <span class="logo">🎵 Music Bingo</span>
    <a href="/admin">Admin</a>
  </nav>

  <div class="container" style="padding-top:2rem;">
    <div class="splash">
      <span class="emoji">🎶</span>
      <h1>Welcome to Music Bingo!</h1>

      <!-- QR join section: shown when ?game=<id> is in the URL -->
      <div id="join-section" style="display:none;">
        <p>Enter your name to get your personal bingo card.</p>
        <div style="display:flex; gap:.75rem; flex-wrap:wrap; justify-content:center; margin-top:.5rem;">
          <input type="text" id="player-name-input" placeholder="Your name…"
                 style="max-width:280px; border-radius:50px;" autocomplete="off" />
          <button class="btn btn-green" id="join-btn">Get my card</button>
        </div>
      </div>

      <!-- Direct card access: shown when no game ID is in the URL -->
      <div id="direct-section">
        <p>The admin will share your unique card link with you.<br>
           Enter a card number below or open the link you received.</p>
        <div style="display:flex; gap:.75rem; flex-wrap:wrap; justify-content:center; margin-top:.5rem;">
          <input type="text" id="card-id-input" placeholder="Paste your card link or ID…"
                 style="max-width:340px; border-radius:50px;" />
          <button class="btn btn-green" id="go-btn">Go to my card</button>
        </div>
      </div>

      <div id="msg" style="margin-top:.5rem;"></div>
    </div>
  </div>

  <script>
    const params   = new URLSearchParams(window.location.search);
    const gameId   = params.get('game');
    const msg      = document.getElementById('msg');

    function setMsg(text, type) {
      msg.innerHTML = `<div class="alert alert-${type === 'error' ? 'error' : 'success'}">${text}</div>`;
    }

    if (gameId) {
      document.getElementById('join-section').style.display = 'block';
      document.getElementById('direct-section').style.display = 'none';

      const nameInput = document.getElementById('player-name-input');
      const joinBtn   = document.getElementById('join-btn');

      joinBtn.addEventListener('click', async () => {
        const name = nameInput.value.trim();
        if (!name) { nameInput.focus(); return; }

        joinBtn.disabled = true;
        joinBtn.textContent = 'Joining…';

        try {
          const res  = await fetch('/api/join', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ playerName: name, gameId }),
          });
          const data = await res.json();

          if (!res.ok) {
            setMsg(data.error, 'error');
            joinBtn.disabled = false;
            joinBtn.textContent = 'Get my card';
            return;
          }

          sessionStorage.setItem('musicbingo_player', name);
          window.location.href = data.url;
        } catch (err) {
          setMsg('Network error: ' + err.message, 'error');
          joinBtn.disabled = false;
          joinBtn.textContent = 'Get my card';
        }
      });

      nameInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') joinBtn.click(); });
    } else {
      const goBtn = document.getElementById('go-btn');
      const input = document.getElementById('card-id-input');

      goBtn.addEventListener('click', () => {
        const val = input.value.trim();
        if (!val) { setMsg('Please enter a card link or ID.', 'error'); return; }

        // Extract UUID from a full URL or use raw input
        const match = val.match(/card\/([a-f0-9-]{36})/i);
        const id = match ? match[1] : val;
        window.location.href = `/card/${id}`;
      });

      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') goBtn.click(); });
    }
  </script>
</body>
</html>
