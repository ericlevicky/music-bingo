<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan to Play – Music Bingo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #1db954;
      --dark:    #121212;
      --surface: #1e1e1e;
      --text:    #ffffff;
      --text-m:  #b3b3b3;
      --radius:  12px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--dark);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.25rem;
      text-align: center;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: .5px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 900;
      margin-bottom: .5rem;
      color: var(--text);
    }

    .subtitle {
      font-size: clamp(.9rem, 2.5vw, 1.2rem);
      color: var(--text-m);
      margin-bottom: 2rem;
    }

    #qr-box {
      background: #fff;
      border-radius: var(--radius);
      padding: 1.25rem;
      display: inline-block;
      margin-bottom: 1.5rem;
    }

    #qr-img {
      display: block;
      width: clamp(200px, 50vmin, 400px);
      height: clamp(200px, 50vmin, 400px);
    }

    #qr-url {
      font-size: clamp(.75rem, 1.5vw, 1rem);
      color: var(--text-m);
      word-break: break-all;
      max-width: 480px;
      margin: 0 auto 1.5rem;
    }

    #error-msg {
      color: #ff6b6b;
      font-size: 1rem;
    }

    .back-link {
      margin-top: 1.5rem;
      font-size: .85rem;
      color: var(--text-m);
    }
    .back-link a {
      color: var(--green);
      text-decoration: none;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo">🎵 Music Bingo</div>
  <h1>Scan to Play!</h1>
  <p class="subtitle">Point your phone's camera at the QR code below.</p>

  <div id="qr-box">
    <img id="qr-img" src="" alt="QR code to join the game" />
  </div>
  <p id="qr-url"></p>
  <p id="error-msg" style="display:none;"></p>

  <div class="back-link"><a href="/admin">← Admin page</a></div>

  <script>
    'use strict';
    const params = new URLSearchParams(window.location.search);
    const gameId = params.get('game');
    const qrImg  = document.getElementById('qr-img');
    const qrUrl  = document.getElementById('qr-url');
    const errMsg = document.getElementById('error-msg');

    if (!gameId) {
      errMsg.textContent = 'No game ID provided. Open this page from the Admin dashboard.';
      errMsg.style.display = '';
      document.getElementById('qr-box').style.display = 'none';
    } else {
      const joinUrl = `${location.origin}/?game=${encodeURIComponent(gameId)}`;
      qrImg.src = `/api/qr/${encodeURIComponent(gameId)}`;
      qrUrl.textContent = joinUrl;

      qrImg.onerror = () => {
        errMsg.textContent = 'Failed to load QR code. The game may have ended.';
        errMsg.style.display = '';
        document.getElementById('qr-box').style.display = 'none';
      };
    }
  </script>
</body>
</html>
